name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  test:
    name: Tests (Python ${{ matrix.python-version }} • ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.12", "3.13"]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: |
            **/uv.lock
            **/pyproject.toml

      # setup-uv supports a python-version input; it sets UV_PYTHON for you.
      - name: Select Python for uv
        shell: bash
        run: echo "UV_PYTHON=${{ matrix.python-version }}" >> "$GITHUB_ENV"

      - name: Install Python
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies (dev)
        run: uv sync --group dev

      - name: Install qsv
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          # Fetch latest release tag using gh CLI (pre-installed on runners)
          QSV_VERSION=$(gh release view -R dathere/qsv --json tagName -q .tagName)
          echo "Installing qsv ${QSV_VERSION}"

          case "${{ runner.os }}" in
            Linux)   ASSET="qsv-${QSV_VERSION}-x86_64-unknown-linux-gnu.zip" ;;
            macOS)
              # Detect architecture for macOS (arm64 for Apple Silicon, x86_64 for Intel)
              ARCH=$(uname -m)
              if [ "$ARCH" = "arm64" ]; then
                ASSET="qsv-${QSV_VERSION}-aarch64-apple-darwin.zip"
              else
                ASSET="qsv-${QSV_VERSION}-x86_64-apple-darwin.zip"
              fi
              ;;
            Windows) ASSET="qsv-${QSV_VERSION}-x86_64-pc-windows-msvc.zip"   ;;
          esac

          curl -fsSL "https://github.com/dathere/qsv/releases/download/${QSV_VERSION}/${ASSET}" -o qsv.zip
          unzip -o qsv.zip -d qsv-bin
          # Add to PATH
          echo "${{ github.workspace }}/qsv-bin" >> "$GITHUB_PATH"

      - name: Verify qsv
        shell: bash
        run: qsv --version

      - name: Run tests
        run: uv run pytest -q tests

  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: |
            **/uv.lock
            **/pyproject.toml

      # setup-uv supports a python-version input; it sets UV_PYTHON for you.
      - name: Select Python for uv
        shell: bash
        run: echo "UV_PYTHON=3.12" >> "$GITHUB_ENV"

      - name: Install Python
        run: uv python install 3.12

      - name: Install dependencies (dev)
        run: uv sync --group dev

      - name: Type check (mypy)
        run: uv run mypy --install-types --non-interactive src tests

      - name: Lint (ruff)
        run: uv run ruff check src tests

      - name: Format check (ruff)
        run: uv run ruff format --check src tests
